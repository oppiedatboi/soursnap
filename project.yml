name: SourSnap
options:
  bundleIdPrefix: com.soursnap
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  SourSnap:
    type: application
    platform: iOS
    sources:
      - path: SourSnap
        excludes:
          - "**/*.xcassets/**/Contents.json"
    resources:
      - path: SourSnap/Assets.xcassets
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSCameraUsageDescription: "SourSnap needs camera access to photograph your sourdough starter"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "SourSnap needs photo library access to select starter photos"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.soursnap.app
        PRODUCT_NAME: SourSnap
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: "6.0"
    dependencies:
      - target: KiboWidgetExtension
        embed: true

  KiboWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: KiboWidget
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Kibo Widget
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.soursnap.app.kibo-widget
        PRODUCT_NAME: KiboWidgetExtension
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
