appId: com.kiboapp.SourSnap
name: "Chat Flow — navigate to Chat, send a message, verify Kiko responds"

---

- launchApp

# Navigate to Chat tab
- tapOn: "Chat"

# Verify empty state
- assertVisible: "Chat with Kiko"
- assertVisible: "Hey! I'm Kiko, your sourdough buddy"
- assertVisible: "Ask me anything about your starter"

# Tap a suggested question
- tapOn: "When should I feed?"

# Verify the user message appears in the chat
- assertVisible: "When should I feed?"

# Wait for Kiko's response (typing indicator then response)
- extendedWaitUntil:
    visible: "Kiko"
    timeout: 15000

# Alternatively, type a custom message
- tapOn: "Ask Kiko anything..."
- inputText: "How do I know if my starter is healthy?"
- tapOn:
    id: "arrow.up.circle.fill"
    optional: true

# Verify the message was sent
- assertVisible: "How do I know if my starter is healthy?"
